services:
  - type: web
    name: powertech
    runtime: node
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: build
    # DOMAIN_PLACEHOLDER: uncomment and replace YOUR_DOMAIN when ready
    # domains:
    #   - YOUR_DOMAIN
    #   - www.YOUR_DOMAIN
    envVars:
      - key: NODE_ENV
        value: production
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
