<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1A1E23" />

    <!-- ============================================================
         SEO META TAGS
         DOMAIN_PLACEHOLDER: replace YOUR_DOMAIN with actual domain
         e.g. https://www.powertech.in
    ============================================================ -->
    <meta name="description" content="Powertech – Expert DG Set Installation, Piping, Electrical Integration, Mechanical Services and HSD Fuel Systems. Engineered for zero downtime." />
    <meta name="keywords" content="DG set installation, diesel generator, electrical contractor, HSD fuel systems, DG piping, mechanical services, power solutions India" />
    <meta name="author" content="Powertech" />
    <meta name="robots" content="index, follow" />

    <!-- Canonical URL — update YOUR_DOMAIN when domain is ready -->
    <link rel="canonical" href="https://YOUR_DOMAIN" />

    <!-- Open Graph (WhatsApp / LinkedIn / Facebook previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Powertech – Precision DG Set Installations & Electrical Mastery" />
    <meta property="og:description" content="Expert DG Set Installation, Piping, Electrical Integration, Mechanical Services and HSD Fuel Systems. Engineered for zero downtime." />
    <meta property="og:url" content="https://YOUR_DOMAIN" />
    <meta property="og:image" content="https://YOUR_DOMAIN/Powertech-logo.png" />
    <meta property="og:site_name" content="Powertech" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Powertech – Precision DG Set Installations & Electrical Mastery" />
    <meta name="twitter:description" content="Expert DG Set Installation, Piping, Electrical Integration, Mechanical Services and HSD Fuel Systems." />
    <meta name="twitter:image" content="https://YOUR_DOMAIN/Powertech-logo.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="%PUBLIC_URL%/Powertech-favicon.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/Powertech-favicon.png" />

    <title>Powertech – Precision DG Set Installations & Electrical Mastery</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
